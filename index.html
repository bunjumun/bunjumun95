<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUNJUMUN-DOOM</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Loading screen -->
  <div id="loading">
    <div class="loading-text">LOADING BUNJUMUN-DOOM...</div>
    <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
  </div>

  <!-- Pointer-lock overlay (repurposed for DOOM) -->
  <div id="lock-overlay">
    <div class="title">BUNJUMUN-DOOM</div>
    <div class="sub">GALLERY SHOOTER</div>
    <div class="hint">MOUSE LOOK · LEFT CLICK TO SHOOT · ⚙ SETTINGS</div>
  </div>

  <!-- DOOM container (canvas appended by DoomEngine) -->
  <div id="game-container">
    <div id="doom-container" class="canvas-layer canvas-active"></div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="crosshair">+</div>
    <button id="settings-btn" title="Settings / Admin">⚙</button>
  </div>
  <div id="controls-hint" style="display:none;">MOUSE LOOK · CLICK TO SHOOT · ⚙ SETTINGS</div>

  <!-- DOOM Win95 HUD -->
  <div id="doom-hud" class="win95-window">
    <div class="win95-titlebar">
      <span>DOOM.EXE — BUNJUMUN GALLERY</span>
    </div>
    <div class="doom-status-panel">
      <span class="doom-status-box">Exhibits: <strong id="doom-score">0 / 0</strong></span>
      <span class="doom-status-box" id="doom-status-text">Ready</span>
    </div>
  </div>

  <!-- Shadow DOM hosts (portals injected here) -->
  <div id="exhibit-host"></div>
  <div id="admin-host"></div>

  <!-- DOOM Game Systems (load order matters) -->
  <script src="js/doom-engine.js?v=2"></script>
  <script src="js/doom-bridge.js?v=2"></script>
  <script src="js/gallery-wad.js?v=2"></script>
  <script src="js/explosion.js?v=2"></script>

  <!-- Gallery Management & UI -->
  <script src="js/exhibit.js?v=2"></script>
  <script src="js/github-api.js?v=2"></script>
  <script src="js/admin.js?v=2"></script>

  <!-- Bootstrap -->
  <script src="js/main.js?v=2"></script>

</body>
</html>
